services:
  postgres:
    image: postgres:16-alpine
    container_name: whatup-postgres
    environment:
      POSTGRES_USER: whatup
      POSTGRES_PASSWORD: whatup
      POSTGRES_DB: whatup
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U whatup -d whatup']
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:4-management
    container_name: whatup-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: whatup
      RABBITMQ_DEFAULT_PASS: whatup
    ports:
      - '5672:5672'
      # management UI: http://localhost:15672 (whatup/whatup)
      - '15672:15672'
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 5s
      timeout: 5s
      retries: 20

  # Cache for the admin read path (cache-aside, invalidated by change hints).
  # No volume on purpose: cache contents are rebuildable by definition, and
  # correctness (idempotency, claims) lives in Postgres, never here.
  redis:
    image: redis:7-alpine
    container_name: whatup-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  # Observability, opt-in: docker compose --profile obs up -d
  # Grafana+Prometheus+Tempo+Loki in one container, fed over OTLP. The
  # backend enables OTel when OTEL_EXPORTER_OTLP_ENDPOINT is set.
  lgtm:
    image: grafana/otel-lgtm:latest
    container_name: whatup-lgtm
    profiles: ['obs']
    ports:
      # Grafana UI: http://localhost:3001 (anonymous admin, demo only)
      - '3001:3000'
      - '4317:4317' # OTLP gRPC
      - '4318:4318' # OTLP HTTP
    environment:
      GF_USERS_DEFAULT_THEME: light
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      # Land on the WhatUp dashboard instead of Grafana's welcome page
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /otel-lgtm/grafana/dashboards/whatup-overview.json
    volumes:
      # Everything (Grafana state, Prometheus TSDB, Loki, Tempo) lives under
      # /data in this image — one volume persists all telemetry across
      # container recreates. Factory reset: docker volume rm whatup_lgtmdata
      - lgtmdata:/data
      - ./observability/grafana/dashboards.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/whatup.yaml:ro
      - ./observability/grafana/whatup-overview.json:/otel-lgtm/grafana/dashboards/whatup-overview.json:ro
      # Overrides of the image's own provisioning: drop the unused Pyroscope
      # datasource and the JVM/RED demo dashboards
      - ./observability/grafana/datasources.yaml:/otel-lgtm/grafana/conf/provisioning/datasources/grafana-datasources.yaml:ro
      - ./observability/grafana/no-sample-dashboards.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/grafana-dashboards.yaml:ro

volumes:
  pgdata:
  rabbitmqdata:
  lgtmdata:
